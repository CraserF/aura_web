<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Water and Data Centre Opportunities in Africa</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Source+Sans+3:wght@300;400;600;700&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; background:#C0DCE8; display:flex; align-items:center; justify-content:center; }

  .slide {
    width:min(100vw,177.78vh); height:min(56.25vw,100vh);
    position:relative; overflow:hidden;
    font-family:'Source Sans 3',sans-serif;
    background:#EAF6FA;
    display:flex; flex-direction:column;
  }

  /* ══ SPLIT BACKGROUND ══ */
  .bg-left {
    position:absolute; left:0; top:0; bottom:0; width:50%;
    background:linear-gradient(135deg, #D8EEF8 0%, #C8E6F4 60%, #D4ECF8 100%);
    z-index:0;
  }
  .bg-right {
    position:absolute; right:0; top:0; bottom:0; width:50%;
    background:linear-gradient(225deg, #D4F0E8 0%, #C8EDE0 60%, #D0EEE8 100%);
    z-index:0;
  }
  /* Diagonal divider slash */
  .bg-slash {
    position:absolute; top:0; bottom:0;
    left:calc(50% - 2px); width:4px;
    background:linear-gradient(to bottom, #00C8A0, #0098B8, #00C8A0);
    z-index:1;
    opacity:0.6;
  }

  /* ══ CONTENT ══ */
  .content {
    position:relative; z-index:10;
    width:100%; height:100%;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:3% 4%;
    gap:clamp(10px,1.6vh,22px);
  }

  /* ── Brand ── */
  .brand-tag {
    flex-shrink:0; text-align:center;
    font-size:clamp(8px,0.8vw,11px); font-weight:700;
    letter-spacing:4px; text-transform:uppercase;
    color:#008870;
    animation:tagFade 2s ease-in-out infinite;
  }
  @keyframes tagFade { 0%,100%{opacity:1} 50%{opacity:0.5} }

  /* ── MAIN VISUAL STRIP ── */
  .vis-strip {
    flex-shrink:0;
    width:100%;
    height:clamp(100px,18vh,165px);
    position:relative;
    display:flex; align-items:center; justify-content:center;
  }

  /* ── TITLES ── */
  .title-block { flex-shrink:0; text-align:center; }
  .title-eyebrow {
    font-size:clamp(9px,0.88vw,12px); font-weight:700;
    letter-spacing:4px; text-transform:uppercase;
    color:#0070A0; margin-bottom:4px;
  }
  .title-main {
    font-family:'Barlow Condensed',sans-serif;
    font-size:clamp(32px,5.2vw,70px);
    font-weight:900; line-height:0.9;
    text-transform:uppercase; color:#041828;
    letter-spacing:-1px;
  }
  .title-accent-water { color:#0090B8; }
  .title-accent-data  { color:#008858; }
  .title-sub {
    font-family:'Barlow Condensed',sans-serif;
    font-size:clamp(20px,3.2vw,44px);
    font-weight:700; text-transform:uppercase;
    color:#2A6878; line-height:1; margin-top:4px;
    letter-spacing:1px;
  }

  /* ── DIVIDER + TAGLINE ── */
  .divider-row {
    flex-shrink:0; display:flex; align-items:center;
    gap:clamp(10px,1.2vw,18px); width:80%;
  }
  .divider-line { flex:1; height:1px; background:linear-gradient(to right,transparent,#0098B8,transparent); opacity:0.4; }
  .divider-text {
    font-size:clamp(10px,1vw,13.5px);
    color:#2A7888; font-weight:400;
    letter-spacing:2px; text-transform:uppercase;
    white-space:nowrap; flex-shrink:0;
    font-style:italic;
  }

  /* ── TWO PILLARS ── */
  .pillars {
    flex-shrink:0; display:flex;
    gap:clamp(12px,1.5vw,22px);
    align-items:center;
  }
  .pillar {
    display:flex; align-items:center; gap:8px;
    padding:clamp(5px,0.6vh,9px) clamp(12px,1.3vw,18px);
    border-radius:30px; font-size:clamp(10px,1vw,13.5px);
    font-weight:700; letter-spacing:0.5px;
  }
  .pillar.water { background:rgba(0,140,184,0.12); border:1.5px solid rgba(0,152,184,0.5); color:#004870; }
  .pillar.data  { background:rgba(0,160,100,0.12); border:1.5px solid rgba(0,168,120,0.5); color:#003A28; }
  .pillar-dot   { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .pillar.water .pillar-dot { background:#0098B8; animation:dotPulse 2s ease-in-out infinite; }
  .pillar.data  .pillar-dot { background:#00A868; animation:dotPulse 2s ease-in-out infinite 0.4s; }
  @keyframes dotPulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.6);opacity:0.4} }

  /* ── Presented by ── */
  .presented {
    flex-shrink:0; text-align:center;
    font-size:clamp(9px,0.88vw,12px); color:#4A7888;
    letter-spacing:2px; text-transform:uppercase;
  }
  .presented strong { color:#1A3848; font-weight:700; }

  /* ══ ANIMATIONS ══ */
  @keyframes waveFlow   { 0%{transform:translateX(0)} 100%{transform:translateX(-320px)} }
  @keyframes dropBob    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
  @keyframes ripOut     { 0%{transform:scale(0.2);opacity:0.7} 100%{transform:scale(1.6);opacity:0} }
  @keyframes blinkLED   { 0%,100%{opacity:0.4} 50%{opacity:1} }
  @keyframes serverScan { 0%{transform:translateY(-100%);opacity:0} 10%{opacity:0.6} 90%{opacity:0.6} 100%{transform:translateY(200%);opacity:0} }
  @keyframes floatData  { 0%{transform:translateY(0) translateX(0);opacity:0} 20%{opacity:0.7} 80%{opacity:0.4} 100%{transform:translateY(-40px) translateX(8px);opacity:0} }
  @keyframes streamFlow { to{stroke-dashoffset:-40} }
  @keyframes particleUp { 0%{transform:translateY(0);opacity:0} 20%{opacity:1} 100%{transform:translateY(-60px);opacity:0} }
  @keyframes globeSpin  { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  .wav  { animation:waveFlow   8s linear infinite; }
  .dbob { animation:dropBob    3s ease-in-out infinite; }
  .rip  { animation:ripOut     2.5s ease-out infinite; }
  .blink{ animation:blinkLED   1.2s ease-in-out infinite; }
  .scan { animation:serverScan 3s ease-in-out infinite; }
  .fd   { animation:streamFlow 2s linear infinite; }
</style>
</head>
