<!doctype html>
<!--
  CINEMATIC TEMPLATE — Reveal.js
  Purpose: Visual storytelling, photography, art showcases, immersive narratives
  Animation Level: Heavy (Level 4)  
  Features: Full-bleed images, Ken Burns, letterbox, film grain, vignette
  
  CUSTOMIZATION POINTS (search for "CUSTOMIZE")
-->
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><!-- CUSTOMIZE --></title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/theme/black.css">
  <link rel="stylesheet" href="../animations/core-animations.css">
  <link rel="stylesheet" href="../animations/advanced-effects.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Montserrat:wght@200;400;600&display=swap');

    :root {
      --r-background-color: #000;
      --r-main-color: #e0e0e0;
      --r-heading-color: #fff;
      --cine-gold: #d4a574;
    }

    .reveal {
      font-family: 'Montserrat', sans-serif;
      font-size: 36px;
      font-weight: 200;
    }

    .reveal .slides section {
      margin: 0;
      padding: 0;
    }

    .reveal h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 4em;
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    .reveal h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5em;
      font-weight: 300;
    }

    /* Letterbox bars */
    .letterbox::before,
    .letterbox::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      height: 12%;
      background: #000;
      z-index: 100;
    }

    .letterbox::before {
      top: 0;
    }

    .letterbox::after {
      bottom: 0;
    }

    /* Vignette */
    .vignette::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.7) 100%);
      z-index: 5;
      pointer-events: none;
    }

    /* Content overlay at bottom */
    .bottom-text {
      position: absolute;
      bottom: 15%;
      left: 5%;
      right: 5%;
      z-index: 10;
      text-align: center;
    }

    .center-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      text-align: center;
      width: 80%;
    }

    /* Subtle caption */
    .caption {
      font-size: 0.8em;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--cine-gold);
      font-weight: 400;
    }

    /* Chapter number */
    .cine-chapter {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.8em;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.3);
    }

    /* Golden separator */
    .gold-line {
      width: 60px;
      height: 1px;
      background: var(--cine-gold);
      margin: 1em auto;
    }

    /* Full-image slide */
    .full-image {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
    }

    .full-image.ken-burns {
      animation: kenBurns 20s ease-in-out alternate infinite;
    }

    @keyframes kenBurns {
      0% {
        transform: scale(1) translate(0, 0);
      }

      100% {
        transform: scale(1.12) translate(-2%, -1.5%);
      }
    }
  </style>
</head>

<body>
  <div class="reveal">
    <div class="slides">

      <!-- SLIDE 1: Black with Title -->
      <section data-background-color="#000" data-transition="fade" class="letterbox">
        <div class="center-text">
          <div class="cine-chapter anim-fade-in-up"><!-- CUSTOMIZE: Subtitle --></div>
          <h1 class="anim-text-blur-focus delay-300">
            <!-- CUSTOMIZE: Title -->
            Into the<br>Unknown
          </h1>
          <div class="gold-line anim-reveal-wipe-right delay-600"></div>
          <div class="caption anim-fade-in-up delay-800"><!-- CUSTOMIZE: Year or tagline --></div>
        </div>
      </section>

      <!-- SLIDE 2: Full Image with Ken Burns -->
      <section data-transition="fade" class="letterbox vignette">
        <!-- CUSTOMIZE: Replace background-color with background-image URL -->
        <div class="full-image ken-burns" style="background: linear-gradient(135deg, #1a1a2e, #16213e);"></div>
        <div class="bottom-text">
          <h2 class="anim-fade-in-up" style="font-size: 2em;">
            <!-- CUSTOMIZE: Caption -->
            Where stories begin
          </h2>
        </div>
      </section>

      <!-- SLIDE 3: Text Only (Dramatic) -->
      <section data-background-color="#000" data-transition="fade" class="letterbox">
        <div class="center-text">
          <p class="anim-text-blur-focus"
            style="font-family: 'Cormorant Garamond', serif; font-size: 2em; font-weight: 300; line-height: 1.6; font-style: italic;">
            <!-- CUSTOMIZE: Narrative text -->
            "Every image tells a story that words cannot capture—a moment frozen between heartbeats."
          </p>
          <div class="gold-line anim-reveal-wipe-right delay-500"></div>
        </div>
      </section>

      <!-- SLIDE 4: Another Full Image -->
      <section data-transition="fade" class="letterbox vignette">
        <div class="full-image ken-burns" style="background: linear-gradient(180deg, #0a192f, #1a2744);"></div>
        <div class="bottom-text">
          <div class="caption anim-fade-in-up">Chapter Two</div>
          <h2 class="anim-fade-in-up delay-200">The Journey</h2>
        </div>
      </section>

      <!-- SLIDE 5: Side-by-side images -->
      <section data-background-color="#000" data-transition="fade" class="letterbox">
        <div
          style="position: absolute; top: 12%; bottom: 12%; left: 0; right: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 4px; z-index: 1;">
          <!-- CUSTOMIZE: Replace with background-images -->
          <div class="fragment fade-in"
            style="background: linear-gradient(135deg, #1a1a3e, #0a0a2e); background-size: cover;"></div>
          <div class="fragment fade-in"
            style="background: linear-gradient(135deg, #2d1b3d, #1a0a2e); background-size: cover;"></div>
        </div>
      </section>

      <!-- SLIDE 6: Final with grain -->
      <section data-background-color="#000" data-transition="fade" class="letterbox cinematic-grain">
        <div class="center-text">
          <div class="caption anim-fade-in-up">Fin</div>
          <h1 class="anim-text-blur-focus delay-300" style="font-size: 4em;">
            Thank You
          </h1>
          <div class="gold-line anim-reveal-wipe-right delay-600"></div>
        </div>
      </section>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.js"></script>
  <script>
    Reveal.initialize({
      hash: true,
      transition: 'fade',
      transitionSpeed: 'slow',
      backgroundTransition: 'fade',
      center: false,
      width: 1920,
      height: 1080,
      margin: 0,
      controls: false,
      progress: false
    });
  </script>
</body>

</html>
