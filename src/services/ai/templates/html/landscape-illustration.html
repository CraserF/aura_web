<!doctype html>
<!--
  LANDSCAPE ILLUSTRATION TEMPLATE — Reveal.js 5
  Purpose: Nature-themed storytelling, environmental reports, travel, outdoor brands
  Animation Level: Heavy (Level 4)
  Features: Layered SVG landscape scenes, cloud drift, water shimmer, bird flight, scene overlays

  Color System:
    --bg:       #0a1628  (deep night sky)
    --primary:  #64B5F6  (sky blue)
    --accent:   #81C784  (nature green)
    Heading:    #f0f4f8  (bright white)
    Body:       rgba(240,244,248,0.7)  (soft white)

  CUSTOMIZATION POINTS (search for "CUSTOMIZE")
-->
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><!-- CUSTOMIZE --></title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ── Design Tokens ────────────────────────────────── */
    :root {
      --bg: #0a1628;
      --primary: #64B5F6;
      --accent: #81C784;
      --heading: #f0f4f8;
      --body: rgba(240, 244, 248, 0.7);
      --card-bg: rgba(10, 22, 40, 0.75);
      --card-border: rgba(100, 181, 246, 0.15);
      --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      --r-background-color: #0a1628;
      --r-main-color: rgba(240, 244, 248, 0.7);
      --r-heading-color: #f0f4f8;
    }

    /* ── Base ─────────────────────────────────────────── */
    .reveal {
      font-family: 'Inter', sans-serif;
      font-size: 36px;
      color: var(--body);
    }

    .reveal .slides {
      text-align: left;
    }

    .reveal .slides section {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }

    /* ── Typography ───────────────────────────────────── */
    .reveal h1,
    .reveal h2,
    .reveal h3 {
      font-family: 'Poppins', sans-serif;
      color: var(--heading);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 0;
    }

    .reveal h1 {
      font-size: 4em;
    }

    .reveal h2 {
      font-size: 2.5em;
    }

    .reveal h3 {
      font-size: 1.3em;
      font-weight: 600;
    }

    .reveal p {
      font-family: 'Inter', sans-serif;
      color: var(--body);
      font-size: 1.1em;
      line-height: 1.7;
      margin-top: 0;
    }

    /* ── Scene Container ─────────────────────────────── */
    .scene {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .scene svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* ── Content Overlay ─────────────────────────────── */
    .content-overlay {
      position: relative;
      z-index: 10;
      padding: 4rem 5rem;
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .content-overlay.center {
      align-items: center;
      text-align: center;
    }

    .content-overlay.bottom {
      justify-content: flex-end;
      padding-bottom: 6rem;
    }

    /* ── Glass Card Panels ───────────────────────────── */
    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 2rem;
      box-shadow: var(--card-shadow);
    }

    .glass-card h3 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.3em;
      color: var(--heading);
      margin: 0 0 12px 0;
    }

    .glass-card p {
      font-family: 'Inter', sans-serif;
      font-size: 1.1em;
      color: var(--body);
      line-height: 1.7;
      margin: 0;
    }

    .glass-card .card-icon {
      font-size: 1.6em;
      margin-bottom: 12px;
      display: block;
    }

    /* ── Card Grids ──────────────────────────────────── */
    .card-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-top: 40px;
    }

    .card-grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1.5rem;
      margin-top: 40px;
    }

    /* ── Accent Line ─────────────────────────────────── */
    .accent-line {
      width: 56px;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border: none;
      border-radius: 2px;
      margin: 24px 0;
    }

    .accent-line.center {
      margin: 24px auto;
    }

    /* ── Pill Badge ───────────────────────────────────── */
    .pill {
      display: inline-block;
      font-family: 'Inter', sans-serif;
      font-size: 0.75em;
      font-weight: 600;
      color: var(--primary);
      background: rgba(100, 181, 246, 0.1);
      border: 1px solid rgba(100, 181, 246, 0.2);
      border-radius: 100px;
      padding: 6px 18px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Timeline ─────────────────────────────────────── */
    .timeline {
      display: flex;
      gap: 2rem;
      margin-top: 48px;
      position: relative;
    }

    .timeline::before {
      content: '';
      position: absolute;
      top: 24px;
      left: 0;
      right: 0;
      height: 2px;
      background: rgba(100, 181, 246, 0.2);
    }

    .timeline-item {
      flex: 1;
      text-align: center;
    }

    .timeline-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--primary);
      margin: 16px auto 20px;
      position: relative;
      z-index: 2;
      box-shadow: 0 0 12px rgba(100, 181, 246, 0.4);
    }

    .timeline-item h3 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.1em;
      color: var(--heading);
      margin: 0 0 8px 0;
    }

    .timeline-item p {
      font-family: 'Inter', sans-serif;
      font-size: 0.85em;
      color: var(--body);
      margin: 0;
    }

    /* ── Stat ─────────────────────────────────────────── */
    .stat-value {
      font-family: 'Poppins', sans-serif;
      font-size: 3em;
      font-weight: 700;
      color: var(--heading);
      line-height: 1.1;
    }

    .stat-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.85em;
      color: var(--body);
      margin-top: 4px;
    }

    /* ── Cloud Animation ─────────────────────────────── */
    .cloud {
      animation: cloud-drift linear infinite;
      opacity: 0.3;
    }

    .cloud-slow { animation-duration: 80s; }
    .cloud-medium { animation-duration: 50s; }
    .cloud-fast { animation-duration: 35s; }

    @keyframes cloud-drift {
      from { transform: translateX(-100%); }
      to { transform: translateX(200%); }
    }

    /* ── Water Shimmer ───────────────────────────────── */
    .water-shimmer {
      animation: water-shimmer 4s ease-in-out infinite;
    }

    @keyframes water-shimmer {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.7; }
    }

    /* ── Bird Flight ─────────────────────────────────── */
    .bird {
      animation: bird-fly 12s ease-in-out infinite;
    }

    .bird-delayed {
      animation: bird-fly 14s ease-in-out 3s infinite;
    }

    @keyframes bird-fly {
      0% { transform: translate(0, 0); }
      50% { transform: translate(200px, -30px); }
      100% { transform: translate(400px, 0); }
    }

    /* ── Star Twinkle ────────────────────────────────── */
    .star-twinkle {
      animation: twinkle 3s ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      0% { opacity: 0.3; }
      100% { opacity: 1; }
    }

    /* ── Utility ──────────────────────────────────────── */
    .spacer-sm { height: 16px; }
    .spacer-md { height: 32px; }
    .spacer-lg { height: 48px; }
  </style>
</head>
