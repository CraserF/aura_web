<!doctype html>
<!--
  MULTI-PANEL DASHBOARD TEMPLATE — Reveal.js 5
  Purpose: Category-based analytics, department overviews, multi-domain KPI tracking
  Animation Level: Moderate (Level 2)
  Features: Multi-column card grids, category color system, mini SVG charts, stat pills, data tables

  Color System:
    --bg:       #F8F9FC  (cool light gray)
    --primary:  #4F6AE8  (indigo)
    --border:   #E8ECF4  (subtle border)
    Heading:    #1a1f36  (deep navy)
    Body:       rgba(26,31,54,0.65)  (muted navy)

  Category Colors:
    Indigo:  #4F6AE8
    Emerald: #10B981
    Amber:   #F59E0B
    Rose:    #F43F5E
    Violet:  #8B5CF6

  CUSTOMIZATION POINTS (search for "CUSTOMIZE")
-->
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><!-- CUSTOMIZE --></title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/theme/black.css">
  <link rel="stylesheet" href="../animations/core-animations.css">
  <link rel="stylesheet" href="../animations/advanced-effects.css">

  <style>
    /* ── Design Tokens ────────────────────────────────── */
    :root {
      --bg: #F8F9FC;
      --primary: #4F6AE8;
      --border: #E8ECF4;
      --heading: #1a1f36;
      --body: rgba(26, 31, 54, 0.65);
      --card-bg: #FFFFFF;
      --card-shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
      --card-shadow-hover: 0 4px 12px rgba(0, 0, 0, 0.08);
      --cat-indigo: #4F6AE8;
      --cat-emerald: #10B981;
      --cat-amber: #F59E0B;
      --cat-rose: #F43F5E;
      --cat-violet: #8B5CF6;
      --r-background-color: #F8F9FC;
      --r-main-color: rgba(26, 31, 54, 0.65);
      --r-heading-color: #1a1f36;
    }

    /* ── Base ─────────────────────────────────────────── */
    .reveal {
      font-family: 'Inter', sans-serif;
      font-size: 36px;
      color: var(--body);
    }

    .reveal .slides {
      text-align: left;
    }

    .reveal .slides section {
      padding: 3.5rem 4.5rem;
      box-sizing: border-box;
    }

    /* ── Typography ───────────────────────────────────── */
    .reveal h1,
    .reveal h2,
    .reveal h3 {
      font-family: 'Inter', sans-serif;
      color: var(--heading);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 0;
    }

    .reveal h1 {
      font-size: 4em;
      font-weight: 800;
    }

    .reveal h2 {
      font-size: 2.4em;
    }

    .reveal h3 {
      font-size: 1.15em;
      font-weight: 600;
    }

    .reveal p {
      font-family: 'Inter', sans-serif;
      color: var(--body);
      font-size: 1.1em;
      line-height: 1.7;
      margin-top: 0;
    }

    /* ── Panel Card ──────────────────────────────────── */
    .panel-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--card-shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      height: 8px;
      flex-shrink: 0;
    }

    .panel-body {
      padding: 1.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .panel-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.7em;
      font-weight: 600;
      color: var(--body);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .panel-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2.2em;
      font-weight: 600;
      color: var(--heading);
      line-height: 1.1;
    }

    .panel-footer {
      padding: 12px 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Metric Chip ─────────────────────────────────── */
    .metric-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7em;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 100px;
    }

    .metric-chip.up {
      color: #10B981;
      background: rgba(16, 185, 129, 0.08);
    }

    .metric-chip.down {
      color: #F43F5E;
      background: rgba(244, 63, 94, 0.08);
    }

    .metric-chip.neutral {
      color: #F59E0B;
      background: rgba(245, 158, 11, 0.08);
    }

    /* ── Grid Layouts ────────────────────────────────── */
    .grid-5 {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1.25rem;
    }

    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.25rem;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }

    .grid-4x2 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: auto auto;
      gap: 1.25rem;
    }

    /* ── Category Chip ───────────────────────────────── */
    .cat-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 0.7em;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card-bg);
    }

    .cat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Mini SVG Charts ─────────────────────────────── */
    .mini-chart {
      margin-top: auto;
      padding-top: 12px;
    }

    /* ── Stat Pill Row ───────────────────────────────── */
    .stat-pill-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .stat-pill {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 24px;
      box-shadow: var(--card-shadow);
      flex: 1;
      min-width: 160px;
    }

    .stat-pill-color {
      width: 4px;
      height: 40px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .stat-pill-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.4em;
      font-weight: 600;
      color: var(--heading);
      line-height: 1.1;
    }

    .stat-pill-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.7em;
      color: var(--body);
    }

    /* ── Data Table ──────────────────────────────────── */
    .dash-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85em;
      margin-top: 16px;
    }

    .dash-table th {
      font-family: 'Inter', sans-serif;
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      font-size: 0.8em;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--body);
      border-bottom: 2px solid var(--border);
    }

    .dash-table td {
      font-family: 'Inter', sans-serif;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--heading);
    }

    .dash-table tr:nth-child(even) {
      background: rgba(79, 106, 232, 0.02);
    }

    .dash-table .mono {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.95em;
    }

    /* ── Priority Card ───────────────────────────────── */
    .priority-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: var(--card-shadow);
      border-left: 4px solid transparent;
    }

    .priority-card.high { border-left-color: var(--cat-rose); }
    .priority-card.medium { border-left-color: var(--cat-amber); }
    .priority-card.low { border-left-color: var(--cat-emerald); }

    .priority-badge {
      display: inline-block;
      font-family: 'Inter', sans-serif;
      font-size: 0.65em;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 100px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* ── Section Header ──────────────────────────────── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .section-header .subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 0.8em;
      color: var(--body);
    }

    /* ── Utility ──────────────────────────────────────── */
    .spacer-sm { height: 16px; }
    .spacer-md { height: 32px; }
    .spacer-lg { height: 48px; }
  </style>
</head>

<body>
  <div class="reveal">
    <div class="slides">

      <!-- ════════════════════════════════════════════════
           SLIDE 1 — Dashboard Cover
           ════════════════════════════════════════════════ -->
      <section data-background-color="#F8F9FC" data-transition="fade">
        <div style="display: flex; flex-direction: column; justify-content: center; height: 100%;">

            <div class="cat-chip">

      <!-- ════════════════════════════════════════════════

      <section data-background-color="#F8F9FC" data-transition="fade">
