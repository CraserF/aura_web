<style>
  :root {
    --split-bg: #edf7fa;
    --split-left: #f7fcfd;
    --split-right: #e4f1f5;
    --split-surface: #ffffff;
    --split-border: rgba(11, 88, 116, 0.16);
    --split-primary: #0d88ad;
    --split-accent: #18a578;
    --split-warm: #d99028;
    --split-ink: #123544;
    --split-body: #486877;
    --split-muted: #7193a0;
    --split-font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .split-slide {
    position: relative;
    width: 100%;
    height: 100%;
    box-sizing: border-box;
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--split-bg);
    color: var(--split-body);
    font-family: var(--split-font);
  }

  .split-panel {
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-width: 0;
    padding: 84px 78px;
  }

  .split-panel-left {
    align-items: flex-end;
    background:
      radial-gradient(circle at 18% 20%, rgba(13, 136, 173, 0.14), transparent 30%),
      var(--split-left);
    text-align: right;
  }

  .split-panel-right {
    align-items: flex-start;
    background:
      radial-gradient(circle at 82% 78%, rgba(24, 165, 120, 0.14), transparent 32%),
      var(--split-right);
    text-align: left;
  }

  .split-seam {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 50%;
    z-index: 3;
    width: 5px;
    border-radius: 999px;
    background: linear-gradient(180deg, transparent, var(--split-primary), var(--split-accent), transparent);
    transform: translateX(-50%);
    animation: splitSeam 5s ease-in-out infinite;
  }

  .split-seam::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    width: 26px;
    height: 26px;
    border-radius: 999px;
    background: var(--split-accent);
    box-shadow: 0 0 36px rgba(24, 165, 120, 0.5);
    transform: translate(-50%, -50%);
  }

  .split-kicker,
  .split-label {
    margin: 0;
    color: var(--split-muted);
    font-size: 17px;
    font-weight: 850;
    letter-spacing: 0.15em;
    line-height: 1.2;
    text-transform: uppercase;
  }

  .split-title {
    max-width: 750px;
    margin: 14px 0 0;
    color: var(--split-ink);
    font-size: 88px;
    font-weight: 880;
    letter-spacing: 0;
    line-height: 0.98;
  }

  .split-subtitle {
    max-width: 610px;
    margin: 24px 0 0;
    color: var(--split-body);
    font-size: 29px;
    line-height: 1.38;
  }

  .split-chip {
    margin-top: 34px;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 16px 22px;
    border: 1px solid var(--split-border);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.74);
    color: var(--split-primary);
    font-size: 21px;
    font-weight: 800;
  }

  .split-card-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 24px;
    padding: 76px 82px;
    grid-column: 1 / -1;
    align-content: center;
    background:
      linear-gradient(135deg, rgba(13, 136, 173, 0.1), transparent 44%),
      var(--split-bg);
  }

  .split-card {
    min-height: 250px;
    padding: 34px 36px;
    border: 1px solid var(--split-border);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.9);
    box-shadow: 0 24px 52px rgba(16, 84, 110, 0.08);
  }

  .split-card h2,
  .split-card h3 {
    margin: 10px 0 12px;
    color: var(--split-ink);
    font-size: 42px;
    line-height: 1.06;
  }

  .split-card p {
    margin: 0;
    color: var(--split-body);
    font-size: 25px;
    line-height: 1.38;
  }

  .split-card-accent {
    width: 74px;
    height: 10px;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--split-primary), var(--split-accent));
  }

  .split-bridge {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 28px;
    align-items: center;
    padding: 34px 38px;
    border: 1px solid var(--split-border);
    border-radius: 8px;
    background: linear-gradient(135deg, #ffffff, #e4f1f5);
    border-left: 7px solid var(--split-warm);
  }

  .split-bridge strong {
    color: var(--split-warm);
    font-size: 56px;
    line-height: 0.95;
  }

  .split-bridge p {
    margin: 0;
    color: var(--split-body);
    font-size: 28px;
    line-height: 1.34;
  }

  @keyframes splitSeam {
    0%, 100% { opacity: 0.54; transform: translateX(-50%) scaleY(0.86); }
    50% { opacity: 1; transform: translateX(-50%) scaleY(1); }
  }

  @media (prefers-reduced-motion: reduce) {
    .split-seam {
      animation: none;
    }
  }
</style>

<section class="split-slide" data-background-color="#edf7fa">
  <div class="split-seam" aria-hidden="true"></div>
  <div class="split-panel split-panel-left">
    <p class="split-kicker">{{LEFT_LABEL}}</p>
    <h1 class="split-title">{{TITLE}}</h1>
  </div>
  <div class="split-panel split-panel-right">
    <p class="split-kicker">{{RIGHT_LABEL}}</p>
    <p class="split-subtitle">{{SUBTITLE}}</p>
    <div class="split-chip">{{BRIDGE_LABEL}}</div>
  </div>
</section>

<section class="split-slide" data-background-color="#edf7fa">
  <div class="split-card-grid">
    <article class="split-card">
      <div class="split-card-accent"></div>
      <p class="split-label">{{LEFT_CARD_LABEL}}</p>
      <h2>{{LEFT_TITLE}}</h2>
      <p>{{LEFT_BODY}}</p>
    </article>
    <article class="split-card">
      <div class="split-card-accent"></div>
      <p class="split-label">{{RIGHT_CARD_LABEL}}</p>
      <h2>{{RIGHT_TITLE}}</h2>
      <p>{{RIGHT_BODY}}</p>
    </article>
    <aside class="split-bridge">
      <strong>{{BRIDGE_NUMBER}}</strong>
      <p>{{BRIDGE_BODY}}</p>
    </aside>
  </div>
</section>
