<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} — Stage Setting Light</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #edf6f9;
      --panel: #dfeef4;
      --surface: #ffffff;
      --border: rgba(9, 102, 128, 0.12);
      --primary: #1096b5;
      --accent: #d78d30;
      --heading: #132d3c;
      --body: #466674;
      --muted: #6e97a4;
      --heading-font: 'Barlow Condensed', sans-serif;
      --body-font: 'Source Sans 3', sans-serif;
    }
    .reveal { font-family: var(--body-font); color: var(--body); font-size: 34px; }
    .reveal .slides { text-align: left; }
    .reveal .slides section { padding: 2.5rem 2.8rem; box-sizing: border-box; }
    .stage-shell { width: 100%; height: 100%; display: grid; grid-template-rows: auto auto 1fr; gap: 0.9rem; }
    .stage-header { display: flex; align-items: end; justify-content: space-between; gap: 1rem; border-bottom: 3px solid var(--primary); padding-bottom: 0.65rem; }
    .stage-header .eyebrow { font-size: 0.66em; letter-spacing: 0.24em; text-transform: uppercase; color: var(--primary); font-weight: 700; margin-bottom: 0.15rem; }
    .stage-header h2 { font-family: var(--heading-font); font-size: 2.7em; line-height: 0.92; letter-spacing: -0.03em; text-transform: uppercase; color: var(--heading); margin: 0; }
    .kpi-strip { display: flex; gap: 1rem; }
    .kpi-strip .kpi { text-align: center; min-width: 86px; }
    .kpi .value { font-family: var(--heading-font); font-size: 1.5em; line-height: 1; color: var(--primary); }
    .kpi .label { font-size: 0.62em; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); font-weight: 700; }
    .stage-layout { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 1rem; min-height: 0; }
    .scene-panel, .insight-card { border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 10px 24px rgba(11, 88, 111, 0.05); }
    .scene-panel { background: linear-gradient(180deg, var(--panel) 0%, #cfe6ef 100%); position: relative; overflow: hidden; min-height: 320px; }
    .scene-panel::before { content: ''; position: absolute; left: 0; right: 0; bottom: 0; height: 34%; background: linear-gradient(180deg, rgba(16, 150, 181, 0.12), rgba(16, 150, 181, 0.22)); }
    .scene-panel::after { content: ''; position: absolute; inset: 14% 10% auto auto; width: 38%; height: 2px; background: linear-gradient(90deg, transparent, rgba(16,150,181,0.7), transparent); }
    .insight-stack { display: grid; gap: 0.75rem; }
    .insight-card { background: var(--surface); padding: 1rem 1.05rem; border-left: 5px solid var(--primary); }
    .insight-card:nth-child(2) { border-left-color: var(--accent); }
    .insight-card:nth-child(3) { border-left-color: #1fa57d; }
    .insight-card h3 { font-size: 0.95em; line-height: 1.2; color: var(--heading); margin: 0 0 0.25rem; }
    .insight-card p { font-size: 0.84em; line-height: 1.52; margin: 0; color: var(--body); }
  </style>
</head>
<body>
  <div class="reveal">
    <div class="slides">
      <section data-background-color="#edf6f9">
        <div class="stage-shell">
          <header class="stage-header">
            <div>
              <div class="eyebrow">Context Frame</div>
              <h2>{{TITLE}}</h2>
            </div>
            <div class="kpi-strip">
              <div class="kpi"><div class="value">01</div><div class="label">Signal</div></div>
              <div class="kpi"><div class="value">02</div><div class="label">Pressure</div></div>
              <div class="kpi"><div class="value">03</div><div class="label">Action</div></div>
            </div>
          </header>
          <div class="stage-layout">
            <div class="scene-panel"></div>
            <div class="insight-stack">
              <article class="insight-card"><h3>Use one scene panel</h3><p>{{SUBTITLE}}</p></article>
              <article class="insight-card"><h3>Keep the insight stack parallel</h3><p>Short, structured cards make the context readable at a glance.</p></article>
              <article class="insight-card"><h3>Favor light editorial framing</h3><p>Use contrast and spacing instead of dense dark panels.</p></article>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>
</body>
</html>
