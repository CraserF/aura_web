<section class="aes-slide aes-big-number {{moodClass}}" data-pack="presentation/editorial-stage-v1" data-layout="big-number" data-background-color="{{background}}">
  <div class="aes-chrome">
    <span data-slot="section_label"></span>
    <span data-slot="source_label"></span>
  </div>
  <main class="aes-number-grid">
    <div>
      <p class="aes-kicker" data-slot="kicker"></p>
      <h2 class="aes-heading" data-slot="title"></h2>
      <p class="aes-body" data-slot="interpretation"></p>
    </div>
    <aside class="aes-number-object">
      <p class="aes-metric" data-slot="metric_value"></p>
      <p class="aes-metric-label" data-slot="metric_label"></p>
    </aside>
  </main>
</section>
