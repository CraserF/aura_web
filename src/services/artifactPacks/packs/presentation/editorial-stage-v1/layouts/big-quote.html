<section class="aes-slide aes-big-quote {{moodClass}}" data-pack="presentation/editorial-stage-v1" data-layout="big-quote" data-background-color="{{background}}">
  <div class="aes-chrome">
    <span data-slot="section_label"></span>
    <span data-slot="slide_number"></span>
  </div>
  <main class="aes-quote-lockup">
    <p class="aes-kicker" data-slot="kicker"></p>
    <blockquote data-slot="quote"></blockquote>
    <cite data-slot="attribution"></cite>
  </main>
</section>
