<section class="aes-slide aes-closing {{moodClass}}" data-pack="presentation/editorial-stage-v1" data-layout="closing-action" data-background-color="{{background}}">
  <div class="aes-chrome">
    <span data-slot="section_label"></span>
    <span data-slot="slide_number"></span>
  </div>
  <main class="aes-closing-lockup">
    <p class="aes-kicker" data-slot="kicker"></p>
    <h2 class="aes-title" data-slot="title"></h2>
    <p class="aes-subtitle" data-slot="subtitle"></p>
  </main>
  <footer class="aes-action-line">
    <span data-slot="owner"></span>
    <span data-slot="next_checkpoint"></span>
  </footer>
</section>
