<section class="aes-slide aes-comparison {{moodClass}}" data-pack="presentation/editorial-stage-v1" data-layout="comparison" data-background-color="{{background}}">
  <div class="aes-chrome">
    <span data-slot="section_label"></span>
    <span data-slot="slide_number"></span>
  </div>
  <header class="aes-header">
    <p class="aes-kicker" data-slot="kicker"></p>
    <h2 class="aes-heading" data-slot="title"></h2>
  </header>
  <main class="aes-compare-grid">
    <article><p class="aes-label" data-slot="left_label"></p><h3 data-slot="left_title"></h3><p data-slot="left_body"></p></article>
    <article><p class="aes-label" data-slot="right_label"></p><h3 data-slot="right_title"></h3><p data-slot="right_body"></p></article>
  </main>
  <p class="aes-verdict" data-slot="verdict"></p>
</section>
