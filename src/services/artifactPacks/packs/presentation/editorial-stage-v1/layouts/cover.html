<section class="aes-slide aes-cover {{moodClass}}" data-pack="presentation/editorial-stage-v1" data-layout="cover" data-background-color="{{background}}">
  <div class="aes-chrome">
    <span data-slot="deck_label"></span>
    <span data-slot="date_label"></span>
  </div>
  <main class="aes-cover-lockup">
    <p class="aes-kicker" data-slot="kicker"></p>
    <h1 class="aes-title" data-slot="title"></h1>
    <p class="aes-subtitle" data-slot="subtitle"></p>
  </main>
  <aside class="aes-proof-line">
    <span data-slot="proof_value"></span>
    <span data-slot="proof_label"></span>
  </aside>
</section>
