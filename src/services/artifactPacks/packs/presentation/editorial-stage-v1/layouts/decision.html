<section class="aes-slide aes-decision {{moodClass}}" data-pack="presentation/editorial-stage-v1" data-layout="decision" data-background-color="{{background}}">
  <div class="aes-chrome">
    <span data-slot="section_label"></span>
    <span data-slot="slide_number"></span>
  </div>
  <main class="aes-decision-grid">
    <article>
      <p class="aes-kicker" data-slot="kicker"></p>
      <h2 class="aes-heading" data-slot="title"></h2>
      <p class="aes-body" data-slot="recommendation"></p>
    </article>
    <aside class="aes-risk-box">
      <p class="aes-label" data-slot="risk_label"></p>
      <p data-slot="risk_body"></p>
      <p class="aes-label" data-slot="proof_label"></p>
      <p data-slot="proof_body"></p>
    </aside>
  </main>
</section>
