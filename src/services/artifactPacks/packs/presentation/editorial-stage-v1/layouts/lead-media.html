<section class="aes-slide aes-lead-media {{moodClass}}" data-pack="presentation/editorial-stage-v1" data-layout="lead-media" data-background-color="{{background}}">
  <div class="aes-chrome">
    <span data-slot="section_label"></span>
    <span data-slot="slide_number"></span>
  </div>
  <main class="aes-lead-media-grid">
    <figure class="aes-media-frame aes-media-large" data-media-slot="primary_media">
      <div class="aes-media-placeholder" data-slot="media_label"></div>
      <figcaption data-slot="caption"></figcaption>
    </figure>
    <article>
      <p class="aes-kicker" data-slot="kicker"></p>
      <h2 class="aes-heading" data-slot="title"></h2>
      <p class="aes-body" data-slot="body"></p>
      <p class="aes-note" data-slot="note"></p>
    </article>
  </main>
</section>
