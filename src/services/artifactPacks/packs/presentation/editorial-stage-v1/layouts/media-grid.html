<section class="aes-slide aes-media-grid {{moodClass}}" data-pack="presentation/editorial-stage-v1" data-layout="media-grid" data-background-color="{{background}}">
  <div class="aes-chrome">
    <span data-slot="section_label"></span>
    <span data-slot="slide_number"></span>
  </div>
  <header class="aes-header">
    <p class="aes-kicker" data-slot="kicker"></p>
    <h2 class="aes-heading" data-slot="title"></h2>
  </header>
  <main class="aes-grid-media">
    <figure class="aes-media-frame" data-media-slot="media_1"><div class="aes-media-placeholder" data-slot="media_1_label"></div><figcaption data-slot="media_1_caption"></figcaption></figure>
    <figure class="aes-media-frame" data-media-slot="media_2"><div class="aes-media-placeholder" data-slot="media_2_label"></div><figcaption data-slot="media_2_caption"></figcaption></figure>
    <figure class="aes-media-frame" data-media-slot="media_3"><div class="aes-media-placeholder" data-slot="media_3_label"></div><figcaption data-slot="media_3_caption"></figcaption></figure>
  </main>
</section>
