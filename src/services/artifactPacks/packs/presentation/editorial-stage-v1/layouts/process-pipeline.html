<section class="aes-slide aes-process {{moodClass}}" data-pack="presentation/editorial-stage-v1" data-layout="process-pipeline" data-background-color="{{background}}">
  <div class="aes-chrome">
    <span data-slot="section_label"></span>
    <span data-slot="slide_number"></span>
  </div>
  <header class="aes-header">
    <p class="aes-kicker" data-slot="kicker"></p>
    <h2 class="aes-heading" data-slot="title"></h2>
    <p class="aes-body" data-slot="body"></p>
  </header>
  <main class="aes-pipeline">
    <article><span>01</span><h3 data-slot="step_1_title"></h3><p data-slot="step_1_body"></p></article>
    <article><span>02</span><h3 data-slot="step_2_title"></h3><p data-slot="step_2_body"></p></article>
    <article><span>03</span><h3 data-slot="step_3_title"></h3><p data-slot="step_3_body"></p></article>
  </main>
</section>
