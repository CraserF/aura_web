<section class="aes-slide aes-question {{moodClass}}" data-pack="presentation/editorial-stage-v1" data-layout="question-hero" data-background-color="{{background}}">
  <div class="aes-chrome">
    <span data-slot="section_label"></span>
    <span data-slot="slide_number"></span>
  </div>
  <main class="aes-question-lockup">
    <p class="aes-kicker" data-slot="kicker"></p>
    <h2 class="aes-title" data-slot="question"></h2>
    <p class="aes-subtitle" data-slot="context"></p>
  </main>
</section>
