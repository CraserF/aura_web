<section class="aes-slide aes-story-split {{moodClass}}" data-pack="presentation/editorial-stage-v1" data-layout="story-split" data-background-color="{{background}}">
  <div class="aes-chrome">
    <span data-slot="section_label"></span>
    <span data-slot="slide_number"></span>
  </div>
  <main class="aes-split">
    <article class="aes-story-copy">
      <p class="aes-kicker" data-slot="kicker"></p>
      <h2 class="aes-heading" data-slot="title"></h2>
      <p class="aes-body" data-slot="body"></p>
      <p class="aes-quote" data-slot="quote"></p>
    </article>
    <figure class="aes-media-frame" data-media-slot="primary_media">
      <div class="aes-media-placeholder" data-slot="media_label"></div>
      <figcaption data-slot="caption"></figcaption>
    </figure>
  </main>
</section>
