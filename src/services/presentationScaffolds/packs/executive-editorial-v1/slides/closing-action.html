<section class="pes-slide pes-closing {{moodClass}} {{densityClass}}" data-scaffold="executive-editorial-v1" data-skeleton="closing-action" data-background-color="{{background}}">
  <div class="pes-motif" aria-hidden="true"></div>
  <div class="pes-shell">
    <header class="pes-stack">
      <p class="pes-kicker" data-slot="kicker"></p>
      <h2 class="pes-heading" data-slot="title"></h2>
      <p class="pes-subtitle" data-slot="subtitle"></p>
    </header>
    <div class="pes-action-list">
      <article class="pes-action">
        <span class="pes-step-index">01</span>
        <div>
          <h3 class="pes-action-title" data-slot="action_1_title"></h3>
          <p class="pes-action-body" data-slot="action_1_body"></p>
        </div>
      </article>
      <article class="pes-action">
        <span class="pes-step-index">02</span>
        <div>
          <h3 class="pes-action-title" data-slot="action_2_title"></h3>
          <p class="pes-action-body" data-slot="action_2_body"></p>
        </div>
      </article>
      <article class="pes-action">
        <span class="pes-step-index">03</span>
        <div>
          <h3 class="pes-action-title" data-slot="action_3_title"></h3>
          <p class="pes-action-body" data-slot="action_3_body"></p>
        </div>
      </article>
    </div>
    <p class="pes-footer" data-slot="footer"></p>
  </div>
</section>
