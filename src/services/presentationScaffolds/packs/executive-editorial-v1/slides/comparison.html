<section class="pes-slide pes-comparison {{moodClass}} {{densityClass}}" data-scaffold="executive-editorial-v1" data-skeleton="comparison" data-background-color="{{background}}">
  <div class="pes-shell">
    <header class="pes-stack">
      <p class="pes-kicker" data-slot="kicker"></p>
      <h2 class="pes-heading" data-slot="title"></h2>
    </header>
    <div class="pes-stack">
      <div class="pes-two-col">
        <article class="pes-lane">
          <p class="pes-label" data-slot="left_label"></p>
          <h3 class="pes-lane-title" data-slot="left_title"></h3>
          <p class="pes-lane-copy" data-slot="left_body"></p>
        </article>
        <article class="pes-lane">
          <p class="pes-label" data-slot="right_label"></p>
          <h3 class="pes-lane-title" data-slot="right_title"></h3>
          <p class="pes-lane-copy" data-slot="right_body"></p>
        </article>
      </div>
      <p class="pes-verdict" data-slot="verdict"></p>
    </div>
    <p class="pes-footer" data-slot="footer"></p>
  </div>
</section>
