<section class="pes-slide pes-context {{moodClass}} {{densityClass}}" data-scaffold="executive-editorial-v1" data-skeleton="context" data-background-color="{{background}}">
  <div class="pes-shell">
    <header class="pes-stack">
      <p class="pes-kicker" data-slot="kicker"></p>
      <h2 class="pes-heading" data-slot="title"></h2>
    </header>
    <div class="pes-grid">
      <article class="pes-panel">
        <p class="pes-label" data-slot="panel_label"></p>
        <h3 class="pes-panel-title" data-slot="panel_title"></h3>
        <p class="pes-panel-copy" data-slot="panel_body"></p>
      </article>
      <div class="pes-stack">
        <p class="pes-body" data-slot="body"></p>
        <p class="pes-quote" data-slot="quote"></p>
        <p class="pes-note" data-slot="note"></p>
      </div>
    </div>
    <p class="pes-footer" data-slot="footer"></p>
  </div>
</section>
