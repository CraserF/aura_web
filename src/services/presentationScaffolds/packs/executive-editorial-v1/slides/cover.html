<section class="pes-slide pes-cover {{moodClass}} {{densityClass}}" data-scaffold="executive-editorial-v1" data-skeleton="cover" data-background-color="{{background}}">
  <div class="pes-motif" aria-hidden="true"></div>
  <div class="pes-shell">
    <p class="pes-kicker" data-slot="kicker"></p>
    <h1 class="pes-title" data-slot="title"></h1>
    <p class="pes-subtitle" data-slot="subtitle"></p>
    <div class="pes-rail">
      <span class="pes-chip" data-slot="metric_value"></span>
      <span class="pes-chip" data-slot="metric_label"></span>
    </div>
    <p class="pes-footer" data-slot="footer"></p>
  </div>
</section>
