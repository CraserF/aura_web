<section class="pes-slide pes-process {{moodClass}} {{densityClass}}" data-scaffold="executive-editorial-v1" data-skeleton="mechanism-process" data-background-color="{{background}}">
  <div class="pes-shell">
    <header class="pes-stack">
      <p class="pes-kicker" data-slot="kicker"></p>
      <h2 class="pes-heading" data-slot="title"></h2>
    </header>
    <div class="pes-grid">
      <div class="pes-stack">
        <p class="pes-body" data-slot="body"></p>
        <p class="pes-quote" data-slot="takeaway"></p>
      </div>
      <div class="pes-process-list">
        <article class="pes-step">
          <span class="pes-step-index">01</span>
          <div>
            <h3 class="pes-step-title" data-slot="step_1_title"></h3>
            <p class="pes-step-body" data-slot="step_1_body"></p>
          </div>
        </article>
        <article class="pes-step">
          <span class="pes-step-index">02</span>
          <div>
            <h3 class="pes-step-title" data-slot="step_2_title"></h3>
            <p class="pes-step-body" data-slot="step_2_body"></p>
          </div>
        </article>
        <article class="pes-step">
          <span class="pes-step-index">03</span>
          <div>
            <h3 class="pes-step-title" data-slot="step_3_title"></h3>
            <p class="pes-step-body" data-slot="step_3_body"></p>
          </div>
        </article>
      </div>
    </div>
    <p class="pes-footer" data-slot="footer"></p>
  </div>
</section>
