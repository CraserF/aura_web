<section class="pes-slide pes-metric-proof {{moodClass}} {{densityClass}}" data-scaffold="executive-editorial-v1" data-skeleton="metric-proof" data-background-color="{{background}}">
  <div class="pes-shell">
    <header class="pes-stack">
      <p class="pes-kicker" data-slot="kicker"></p>
      <h2 class="pes-heading" data-slot="title"></h2>
    </header>
    <div class="pes-proof-grid">
      <div class="pes-metric-row">
        <article class="pes-metric">
          <p class="pes-metric-value" data-slot="metric_1_value"></p>
          <p class="pes-metric-label" data-slot="metric_1_label"></p>
        </article>
        <article class="pes-metric">
          <p class="pes-metric-value" data-slot="metric_2_value"></p>
          <p class="pes-metric-label" data-slot="metric_2_label"></p>
        </article>
        <article class="pes-metric">
          <p class="pes-metric-value" data-slot="metric_3_value"></p>
          <p class="pes-metric-label" data-slot="metric_3_label"></p>
        </article>
      </div>
      <aside class="pes-proof">
        <p class="pes-label" data-slot="proof_label"></p>
        <p class="pes-quote" data-slot="proof_statement"></p>
        <p class="pes-note" data-slot="note"></p>
      </aside>
    </div>
    <p class="pes-footer" data-slot="footer"></p>
  </div>
</section>
